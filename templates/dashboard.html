{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-content">Projects</h1>
        <button
            class="bg-primary hover:bg-blue-600 text-content-inv px-4 py-2 rounded flex items-center gap-2 transition-colors"
            onclick="openModal('createProjectModal')">
            <i class="fa-solid fa-plus"></i> New Project
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="projectList">
        <!-- Projects will be loaded here -->
    </div>
</div>

<!-- Create Project Modal -->
<div class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4" id="createProjectModal">
    <div class="bg-panel rounded-lg shadow-xl w-full max-w-md p-6 border border-border">
        <h2 class="text-xl font-bold text-content mb-6">Create New Project</h2>
        <form id="createProjectForm" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-sm font-medium text-content-muted">Project Name</label>
                <input type="text" name="name"
                    class="w-full bg-surface border border-border rounded px-3 py-2 text-content focus:outline-none focus:border-primary transition-colors"
                    required>
            </div>
            <div class="space-y-1">
                <label class="block text-sm font-medium text-content-muted">Images Folder Path (Absolute)</label>
                <input type="text" name="root_path"
                    class="w-full bg-surface border border-border rounded px-3 py-2 text-content focus:outline-none focus:border-primary transition-colors"
                    required placeholder="C:\Path\To\Images">
            </div>
            <div class="space-y-1">
                <label class="block text-sm font-medium text-content-muted">Classes File Path (Absolute)</label>
                <input type="text" name="classes_path"
                    class="w-full bg-surface border border-border rounded px-3 py-2 text-content focus:outline-none focus:border-primary transition-colors"
                    required placeholder="C:\Path\To\classes.txt">
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button type="button"
                    class="px-4 py-2 text-sm text-content-muted hover:text-content hover:bg-surface rounded transition-colors"
                    onclick="closeModal('createProjectModal')">Cancel</button>
                <button type="submit"
                    class="px-4 py-2 text-sm bg-primary hover:bg-blue-600 text-content-inv rounded transition-colors">Create</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id).classList.remove('hidden');
    }

    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    async function loadProjects() {
        const projects = await API.getProjects();
        const container = document.getElementById('projectList');

        container.innerHTML = projects.map(p => `
            <div class="bg-panel rounded-lg p-5 border border-border hover:border-primary transition-all shadow-sm">
                <div class="text-content font-semibold text-lg mb-2 truncate" title="${p.name}">${p.name}</div>
                <div class="text-content-muted text-sm mb-4 truncate flex items-center gap-2" title="${p.root_path}">
                    <i class="fa-regular fa-folder"></i> ${p.root_path}
                </div>
                <div class="flex gap-2 mt-4">
                    <a href="/project/${p.id}" class="flex-1 bg-primary hover:bg-blue-600 text-content-inv text-center py-2 rounded text-sm transition-colors">
                        Open Workspace
                    </a>
                    <button onclick="scanProject(${p.id})" class="bg-surface hover:bg-border text-content px-3 rounded transition-colors" title="Scan Folder">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                    <button onclick="deleteProject(${p.id})" class="bg-surface hover:bg-red-900/50 text-red-500 hover:text-red-300 px-3 rounded transition-colors" title="Delete Project">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div >
        `).join('');
    }

    async function deleteProject(id) {
        if (confirm('Are you sure you want to delete this project? This will only remove metadata from DB, image files will remain.')) {
            const res = await API.deleteProject(id);
            if (res.error) {
                alert('Error: ' + res.error);
            } else {
                loadProjects();
            }
        }
    }

    async function scanProject(id) {
        if (confirm('Scan folder for new images?')) {
            const res = await API.scanProject(id);
            alert(res.message);
        }
    }

    document.getElementById('createProjectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        const res = await API.createProject(data);
        if (res.error) {
            alert('Error: ' + res.error);
        } else {
            closeModal('createProjectModal');
            loadProjects();
            e.target.reset();
        }
    });

    // Initial Load
    loadProjects();
</script>
{% endblock %}
